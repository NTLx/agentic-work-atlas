name: Deploy Agentic Work Atlas to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Agentic Work Atlas content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: atlas

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: quartz

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Wiki Lint
        working-directory: atlas
        run: python3 tools/wiki-lint.py

      - name: Install Quartz Dependencies
        working-directory: quartz
        run: npm ci

      - name: Setup Quartz Configuration
        run: |
          cp atlas/quartz.config.ts quartz/
          cp atlas/quartz.layout.ts quartz/
          if [ -d atlas/quartz-overrides/styles ]; then
            cp atlas/quartz-overrides/styles/*.scss quartz/quartz/styles/
          fi

      - name: Build Quartz (方案 C：直接使用仓库根目录)
        working-directory: quartz
        run: npx quartz build -d ../atlas

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
